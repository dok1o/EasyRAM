name: EasyRam CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — BUILD
  # ─────────────────────────────────────────
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download Dear ImGui
        shell: cmd
        run: |
          mkdir imgui
          mkdir imgui\backends
          curl -L -o imgui\imgui.h          https://raw.githubusercontent.com/ocornut/imgui/v1.90.4/imgui.h
          curl -L -o imgui\imgui.cpp        https://raw.githubusercontent.com/ocornut/imgui/v1.90.4/imgui.cpp
          curl -L -o imgui\imgui_draw.cpp   https://raw.githubusercontent.com/ocornut/imgui/v1.90.4/imgui_draw.cpp
          curl -L -o imgui\imgui_tables.cpp https://raw.githubusercontent.com/ocornut/imgui/v1.90.4/imgui_tables.cpp
          curl -L -o imgui\imgui_widgets.cpp https://raw.githubusercontent.com/ocornut/imgui/v1.90.4/imgui_widgets.cpp
          curl -L -o imgui\imgui_internal.h https://raw.githubusercontent.com/ocornut/imgui/v1.90.4/imgui_internal.h
          curl -L -o imgui\imconfig.h       https://raw.githubusercontent.com/ocornut/imgui/v1.90.4/imconfig.h
          curl -L -o imgui\imstb_rectpack.h https://raw.githubusercontent.com/ocornut/imgui/v1.90.4/imstb_rectpack.h
          curl -L -o imgui\imstb_textedit.h https://raw.githubusercontent.com/ocornut/imgui/v1.90.4/imstb_textedit.h
          curl -L -o imgui\imstb_truetype.h https://raw.githubusercontent.com/ocornut/imgui/v1.90.4/imstb_truetype.h
          curl -L -o imgui\backends\imgui_impl_win32.h   https://raw.githubusercontent.com/ocornut/imgui/v1.90.4/backends/imgui_impl_win32.h
          curl -L -o imgui\backends\imgui_impl_win32.cpp https://raw.githubusercontent.com/ocornut/imgui/v1.90.4/backends/imgui_impl_win32.cpp
          curl -L -o imgui\backends\imgui_impl_dx11.h    https://raw.githubusercontent.com/ocornut/imgui/v1.90.4/backends/imgui_impl_dx11.h
          curl -L -o imgui\backends\imgui_impl_dx11.cpp  https://raw.githubusercontent.com/ocornut/imgui/v1.90.4/backends/imgui_impl_dx11.cpp

      - name: Compile EasyRam
        shell: cmd
        run: cl.exe /EHsc /W3 /O2 /DUNICODE /D_UNICODE /I. /Iimgui /Iimgui\backends EasyRam.cpp imgui\imgui.cpp imgui\imgui_draw.cpp imgui\imgui_tables.cpp imgui\imgui_widgets.cpp imgui\backends\imgui_impl_win32.cpp imgui\backends\imgui_impl_dx11.cpp /Fe:EasyRam.exe /link psapi.lib d3d11.lib dxgi.lib user32.lib gdi32.lib advapi32.lib /SUBSYSTEM:WINDOWS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyRam
          path: EasyRam.exe

  # ─────────────────────────────────────────
  # JOB 2 — RELEASE (version tags only)
  # ─────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: EasyRam

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: EasyRam.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
